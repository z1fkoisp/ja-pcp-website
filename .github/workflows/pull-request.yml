name: pull-request
'on': pull_request_target
jobs:
  deploy-ja:
    name: Deploy Japanese translation to surge.sh
    runs-on: ubuntu-latest
    steps:
    - name: Checkout base branch
      uses: actions/checkout@v2
    - name: Checkout merged commit to 'merged' dir
      uses: actions/checkout@v2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        path: merged
    - name: Copy l10n dir
      run: 'rm -rf l10n

        cp -r merged/l10n ./

        '
    - name: Cache bundle directory
      uses: actions/cache@v2
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gem-${{ hashFiles('**/Gemfile.lock') }}
    - name: Setup build env
      run: 'bin/setup-build-env

        '
    - name: Configure git
      run: 'bin/configure-git

        '
    - name: Exec po4a-translate
      run: bin/exec-po4a-translate
    - name: Deploy to surge
      run: 'surge translated/ja_JP/docs pr-preview-"${{ github.event.pull_request.number
        }}"-ja-pcp.surge.sh

        '
      env:
        SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
    - name: Add comment
      uses: actions/github-script@v3.1.0
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: "let body = `Site preview(ja): https://pr-preview-${{ github.event.pull_request.number\
          \ }}-ja-pcp.surge.sh`\ngithub.issues.createComment({\n  issue_number: context.issue.number,\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  body: body\n\
          })\n"
